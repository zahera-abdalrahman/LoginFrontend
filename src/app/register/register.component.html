<section class="vh-100 signup-section">
    <div class="container h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-lg-12 col-xl-11">
          <div class="card text-black signup-card">
            <div class="card-body py-4 px-4">
              <div class="row justify-content-center">
  
                <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
                  <p class="text-center h2 fw-bold mb-4">Sign up</p>
  
                  <form class="mx-1 mx-md-4" [formGroup]="registerForm" (ngSubmit)="addUser()">
                    <div class="name-row mb-4">
                      <div class="icon-col">
                        <i class="fas fa-user"></i>
                      </div>
  
                      <div class="input-col">
                        <input type="text" class="form-control" formControlName="txtfName" placeholder="Your First Name">
                      </div>
  
                      <div class="input-col">
                        <input type="text" class="form-control" formControlName="txtlName" placeholder="Your Last Name">
                      </div>
                    </div>
  
  
                    <div class="form-row mb-4">
                      <div class="icon-col">
                        <i class="fas fa-envelope"></i>
                      </div>
                      <div class="input-col">
                        <input type="email" class="form-control" formControlName="txtEmail" placeholder="Your Email">
                      </div>
                    </div>
  
                    <div class="form-row mb-4">
                      <div class="icon-col">
                        <i class="fas fa-calendar"></i>
                      </div>
                      <div class="input-col">
                        <input type="date" class="form-control" formControlName="txtDOB" placeholder="Date of Birth">
                      </div>
                    </div>
  
                    <div class="form-row mb-4">
                      <div class="icon-col">
                        <i class="fas fa-venus-mars"></i>
                      </div>
                      <div class="input-col">
                        <select class="form-select" formControlName="txtGender">
                          <option value="" disabled selected>Select gender</option>
                          <option value="Male">Male</option>
                          <option value="Female">Female</option>
                        </select>
                      </div>
                    </div>
  
                    <div class="form-row mb-4 password-row">
                      <div class="icon-col">
                        <i class="fas fa-lock"></i>
                      </div>
                      <div class="input-col">
                        <input [type]="showPassword ? 'text' : 'password'" class="form-control" formControlName="txtPassword" placeholder="Password">
                      </div>
                      <button type="button" class="btn btn-outline-secondary btn-sm show-btn" (click)="togglePasswordVisibility('password')">{{ showPassword ? 'Hide' : 'Show' }}
                      </button>
                    </div>
  
                    <div class="form-row mb-4 password-row">
                      <div class="icon-col">
                        <i class="fas fa-key"></i>
                      </div>
                      <div class="input-col">
                        <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control" formControlName="txtConfirmPassword" placeholder="Repeat your password">
                      </div>
                      <button type="button"
                              class="btn btn-outline-secondary btn-sm show-btn"
                              (click)="togglePasswordVisibility('confirmPassword')">
                        {{ showConfirmPassword ? 'Hide' : 'Show' }}
                      </button>
                    </div>
  
                    <div class="d-flex justify-content-center">
                      <button type="submit" class="btn btn-primary btn-lg" [disabled]="registerForm.invalid">
                        Register
                      </button>
                    </div>
  
                  </form>
                </div>
  
                <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">
                  <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                       class="img-fluid" alt="Sample image">
                </div>
  
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
